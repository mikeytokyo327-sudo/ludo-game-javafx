spring:
  application:
    name: ludo-backend
  datasource:
    url: jdbc:h2:mem:ludodb
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080
app:
  jwtSecret: ludoGameSecretKeyForJWTTokenGenerationAndValidation
  jwtExpirationMs: 86400000
logging:
  level:
    root: INFO
    com.ludogame: DEBUG